<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Writing Practice - English Tutor</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 720px;
            margin: 2rem auto;
            padding: 0 1rem;
            color: #222;
            line-height: 1.5;
        }
        h1 { color: #2b5278; margin-bottom: 0.25rem; }
        h2 { color: #2b5278; margin-top: 0; }
        a { color: #2b5278; }
        .tag { color: #888; font-size: 0.95rem; margin-top: 0; }
        .nav { font-size: 0.9rem; margin-bottom: 1rem; }
        label {
            display: block;
            font-weight: 600;
            margin-top: 1.2rem;
            margin-bottom: 0.25rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.5rem;
            font-size: 1rem;
            font-family: inherit;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea { resize: vertical; }
        button {
            margin-top: 1.2rem;
            padding: 0.7rem 1.4rem;
            background: #2b5278;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #1d3a57; }
        button:disabled { background: #888; cursor: wait; }
        .feedback {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f4f7fb;
            border-left: 4px solid #2b5278;
            border-radius: 4px;
        }
        .feedback-text {
            white-space: pre-wrap;
            font-family: inherit;
            margin: 0;
        }
    </style>
</head>
<body>
    <p class="nav"><a href="/">&larr; Home</a></p>
    <h1>Writing practice</h1>
    <p class="tag">Submit a piece of writing and get feedback from an AI tutor.</p>

    <form method="POST" action="/writing" onsubmit="document.getElementById('submit-btn').disabled = true; document.getElementById('submit-btn').textContent = 'Reading your writing...';">
        <label for="grade">Your grade level</label>
        <select id="grade" name="grade" required>
            {% for g in range(1, 13) %}
                <option value="{{ g }}" {% if submitted.grade == g %}selected{% endif %}>Grade {{ g }}</option>
            {% endfor %}
        </select>

        <label for="prompt">Writing prompt</label>
        <textarea id="prompt" name="prompt" rows="3" required placeholder="e.g., Describe a time you helped someone.">{{ submitted.prompt or "" }}</textarea>

        <label for="essay">Your writing</label>
        <textarea id="essay" name="essay" rows="10" required placeholder="Write your response here...">{{ submitted.essay or "" }}</textarea>

        <button type="submit" id="submit-btn">Get feedback</button>
    </form>

    {% if feedback %}
    <div class="feedback">
        <h2>Feedback</h2>
        <pre class="feedback-text">{{ feedback }}</pre>
    </div>
    {% endif %}
</body>
</html>
